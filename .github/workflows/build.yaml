name: Zephyr Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: zephyrprojectrtos/zephyr-build:v0.29.0
      options: --user root

    env:
      ZEPHYR_SDK_INSTALL_DIR: /opt/toolchains/zephyr-sdk-1.0.0

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          path: my-project 

      - name: Cache Zephyr Workspace
        id: cache-zephyr
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: |
            zephyr
            modules
            tools
            bootloader
            .west
          key: ${{ runner.os }}-zephyr-${{ hashFiles('my-project/firmware/west.yml') }}
          restore-keys: |
            ${{ runner.os }}-zephyr-

      - name: Initialize West
        # Only run if cache missed
        if: steps.cache-zephyr.outputs.cache-hit != 'true'
        run: |
          west init -l my-project/firmware
          west update

      - name: Build Firmware
        run: |
          west build -b native_sim my-project/firmware

      - name: Run Simulation Test
        run: |
          timeout 5s ./build/zephyr/zephyr.exe > output.log || true
          grep "Hello from CloudSense" output.log
