name: Zephyr Build

on:
  push:
    branches: [ main ]
    paths:
      - 'firmware/**'
      - '.github/workflows/build.yaml'
  pull_request:
    branches: [ main ]
    paths:
      - 'firmware/**'
      - '.github/workflows/build.yaml'

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: zephyrprojectrtos/zephyr-build:v0.29.0
      options: --user root

    env:
      ZEPHYR_SDK_INSTALL_DIR: /opt/toolchains/zephyr-sdk-1.0.0

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          path: my-project

      - name: Initialize West
        run: |
          cd my-project
          west init -l firmware
          west update

      - name: Build Application
        run: |
          cd my-project
          west build -b native_sim firmware/app

      - name: Run Tests Tagged with "cloudsense"
        run: |
          cd my-project
          west twister -p native_sim -T firmware -t cloudsense --outdir test-results -v
